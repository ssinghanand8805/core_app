name: core_app
description: Production-ready Flutter app with API, offline-first, theme, localization, error handling.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.3
  fluttertoast: ^8.2.6
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.17.0
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
